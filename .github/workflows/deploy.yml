name: Build & deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Con dominio propio (CNAME → ruizdavies.com) el prefijo es "/".
      # Si se sirviera desde quitiweb.github.io/rd/, definir la
      # variable de repositorio PATH_PREFIX=/rd/.
      - run: npx eleventy --pathprefix "${PATH_PREFIX}"
        env:
          PATH_PREFIX: ${{ vars.PATH_PREFIX || '/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
